remote_theme: giellalt/jekyll-theme-giellalt@main
title: NLP Grammar with no linguistic content
description: Finite state and Constraint Grammar based testing bed. Asume nothing works!
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-include-cache
  - jemoji

defaults:
  - scope: { path: "" }
    values:
      layout: default

markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    disable: true
